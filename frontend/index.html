<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MatterMatters - WEBARDU</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap");

    :root {
      --bg-0: #b9bcb0;
      --bg-1: #dde0d3;
      --surface: #eceee3;
      --surface-hi: #f5f7ee;
      --text: #2c2e2d;
      --muted: #7b7f79;
      --primary: #4b4e4a;
      --primary-hover: #2f3130;
      --border: #3c3e3b;
      --ok: #242624;
      --error: #3b2f2f;
      --shadow: #8f9287;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      background:
        repeating-linear-gradient(
          0deg,
          rgba(47, 49, 48, 0.08) 0,
          rgba(47, 49, 48, 0.08) 1px,
          transparent 1px,
          transparent 4px
        ),
        radial-gradient(circle at 10% 10%, #dfe0d7 0%, transparent 35%),
        radial-gradient(circle at 90% 80%, #c6c8bc 0%, transparent 30%),
        linear-gradient(180deg, var(--bg-1) 0%, var(--bg-0) 100%);
      color: var(--text);
      font-family: "Press Start 2P", "DungGeunMo", "Courier New", monospace;
    }

    main {
      width: min(92vw, 460px);
      background: var(--surface);
      border: 3px solid var(--border);
      border-radius: 0;
      padding: 20px;
      box-shadow: 8px 8px 0 var(--shadow);
      image-rendering: pixelated;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 1rem;
      line-height: 1.5;
      color: var(--text);
      text-shadow: 2px 2px 0 #ecece5;
    }

    p {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 0.66rem;
      line-height: 1.8;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.64rem;
      color: #575b57;
    }

    .panel {
      border: 3px solid var(--border);
      background: linear-gradient(180deg, #e7e9de 0%, #daddd0 100%);
      padding: 10px;
      margin-bottom: 12px;
      box-shadow: inset 0 0 0 2px #eef0e6;
    }

    .panel-title {
      display: inline-block;
      margin: 0 0 10px;
      font-size: 0.55rem;
      letter-spacing: 0.03em;
      color: #e6e9dc;
      background: #5a5e58;
      border: 2px solid #4a4d48;
      padding: 4px 7px;
      box-shadow: 2px 2px 0 #9ca095;
    }

    .template-panel {
      position: relative;
      background:
        linear-gradient(180deg, #e1e2d8 0%, #d4d5cb 100%),
        repeating-linear-gradient(90deg, rgba(47, 49, 48, 0.05) 0, rgba(47, 49, 48, 0.05) 2px, transparent 2px, transparent 6px);
    }

    .template-panel::after {
      content: "";
      position: absolute;
      right: 10px;
      top: 10px;
      width: 9px;
      height: 9px;
      border: 2px solid var(--border);
      background: #b8baae;
    }

    .params-panel {
      background: linear-gradient(180deg, #d8dacd 0%, #cdd0c2 100%);
      border-style: solid;
      border-color: #2f3130;
      box-shadow: inset 0 0 0 2px #e6e8de, 4px 4px 0 #94988d;
    }

    .params-panel .panel-title {
      color: #fff5f6;
      background: #8c2f3c;
      border-color: #5b2b32;
      box-shadow: 2px 2px 0 #b05a67;
    }

    input {
      width: 100%;
      border: 3px solid var(--border);
      border-radius: 0;
      padding: 10px;
      font-size: 0.75rem;
      font-family: inherit;
      color: #545853;
      background: #edf0e5;
      margin-bottom: 8px;
    }

    textarea {
      width: 100%;
      border: 3px solid var(--border);
      border-radius: 0;
      padding: 10px;
      font-size: 0.65rem;
      font-family: inherit;
      color: #545853;
      background: #edf0e5;
      margin-bottom: 8px;
      min-height: 90px;
      resize: vertical;
      line-height: 1.6;
    }

    .code-input {
      font-family: "JetBrains Mono", "Fira Code", "SFMono-Regular", Menlo, Consolas, monospace;
      font-size: 0.92rem;
      font-weight: 700;
      letter-spacing: 0;
      background: #d9dacd;
      color: #1f2120;
    }

    select {
      width: 100%;
      border: 3px solid var(--border);
      border-radius: 0;
      padding: 10px;
      font-size: 0.75rem;
      font-family: inherit;
      color: #545853;
      background: #edf0e5;
      margin-bottom: 8px;
    }

    .device-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .device-info {
      font-size: 0.55rem;
      color: var(--muted);
      line-height: 1.7;
    }

    .ghost-btn {
      width: auto;
      padding: 8px 9px;
      border: 3px solid var(--border);
      border-radius: 0;
      background: #e7eadf;
      color: #5c605b;
      font-size: 0.56rem;
      font-family: inherit;
      cursor: pointer;
      box-shadow: 3px 3px 0 var(--shadow);
    }

    .ghost-btn:hover:enabled {
      background: #d9dccf;
    }

    small {
      color: var(--muted);
      display: block;
      margin-bottom: 14px;
      font-size: 0.53rem;
      line-height: 1.6;
    }

    #templateParams small {
      margin-bottom: 10px;
    }

    button {
      width: 100%;
      border: 3px solid var(--border);
      background: var(--primary);
      color: #eef0e8;
      border-radius: 0;
      padding: 10px 12px;
      font-size: 0.72rem;
      font-family: inherit;
      cursor: pointer;
      box-shadow: 5px 5px 0 var(--shadow);
      transition: transform 80ms ease-out;
    }

    button:hover:enabled {
      background: var(--primary-hover);
      color: #eef0e8;
    }

    #submitBtn {
      background: #c64a5a;
      color: #fff5f6;
      border-color: #5b2b32;
      box-shadow: 5px 5px 0 #8b3f49, inset 0 -2px 0 rgba(0, 0, 0, 0.2);
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    #submitBtn:hover:enabled {
      background: #ad3646;
      color: #fff5f6;
    }

    button:active:enabled,
    .ghost-btn:active:enabled {
      transform: translate(2px, 2px);
    }

    button:disabled { opacity: 0.65; cursor: not-allowed; }

    .status {
      margin-top: 14px;
      min-height: 1.4rem;
      font-size: 0.62rem;
      line-height: 1.6;
      color: var(--text);
    }

    .status.ok { color: var(--ok); }
    .status.error { color: var(--error); }

    pre {
      margin-top: 10px;
      min-height: 60px;
      max-height: 140px;
      overflow: auto;
      border-radius: 0;
      border: 3px solid var(--border);
      background: #0b0b0b;
      padding: 10px;
      font-size: 0.57rem;
      line-height: 1.75;
      white-space: pre-wrap;
      word-break: break-word;
      color: #f5f5f5;
    }

    @media (max-width: 560px) {
      main {
        width: 100%;
        padding: 16px;
      }

      .device-row {
        flex-direction: column;
        align-items: stretch;
      }

      .ghost-btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>MATTERMATTERS - WEBARDU</h1>

    <form id="uploadForm">
      <section class="panel template-panel">
        <h2 class="panel-title">FIRMWARE SELECT</h2>
        <select id="templateSelect" name="template"></select>
      </section>

      <section class="panel params-panel">
        <h2 class="panel-title">CODE EDIT</h2>
        <div id="templateParams"></div>
      </section>

      <label>Detected Board</label>
      <div class="device-row">
        <div id="boardInfo" class="device-info">Checking...</div>
        <button id="refreshBtn" class="ghost-btn" type="button">RESCAN</button>
      </div>
      <button id="submitBtn" type="submit">UPLOAD</button>
    </form>

    <div id="status" class="status">Idle</div>
    <pre id="logs"></pre>
  </main>

  <script>
    const form = document.getElementById("uploadForm");
    const templateSelect = document.getElementById("templateSelect");
    const templateParams = document.getElementById("templateParams");
    const submitBtn = document.getElementById("submitBtn");
    const refreshBtn = document.getElementById("refreshBtn");
    const boardInfoEl = document.getElementById("boardInfo");
    const statusEl = document.getElementById("status");
    const logsEl = document.getElementById("logs");
    let selectedBoard = null;
    let templates = [];
    let selectedTemplate = null;

    function setStatus(text, type) {
      statusEl.textContent = text;
      statusEl.className = "status" + (type ? " " + type : "");
    }

    function setLogs(lines) {
      logsEl.textContent = Array.isArray(lines) ? lines.join("\n") : String(lines || "");
    }

    function renderBoardInfo(board) {
      if (!board) {
        boardInfoEl.textContent = "연결된 지원 보드 없음";
        return;
      }

      boardInfoEl.textContent = board.port
        ? `${board.boardName} / ${board.port}`
        : `${board.boardName} / port not found`;
    }

    function canUpload() {
      return Boolean(selectedBoard && selectedTemplate);
    }

    function updateSubmitState() {
      submitBtn.disabled = !canUpload();
    }

    function createParamInput(param) {
      if (param.type === "enum") {
        const select = document.createElement("select");
        for (const option of param.options || []) {
          const item = document.createElement("option");
          item.value = option;
          item.textContent = option;
          select.appendChild(item);
        }
        select.value = String(param.default ?? (param.options && param.options[0]) ?? "");
        return select;
      }

      if (param.type === "bool") {
        const select = document.createElement("select");
        const trueOption = document.createElement("option");
        trueOption.value = "true";
        trueOption.textContent = "true";
        const falseOption = document.createElement("option");
        falseOption.value = "false";
        falseOption.textContent = "false";
        select.appendChild(trueOption);
        select.appendChild(falseOption);
        select.value = String(param.default ?? "false") === "true" ? "true" : "false";
        return select;
      }

      if (param.type === "code") {
        const textarea = document.createElement("textarea");
        textarea.value = String(param.default ?? "");
        textarea.className = "code-input";
        return textarea;
      }

      const input = document.createElement("input");
      if (param.type === "int" || param.type === "float") {
        input.type = "number";
        if (param.type === "int") input.step = "1";
        if (Number.isFinite(param.min)) input.min = String(param.min);
        if (Number.isFinite(param.max)) input.max = String(param.max);
      } else {
        input.type = "text";
      }

      input.value = String(param.default ?? "");
      return input;
    }

    function renderTemplateParams(template) {
      templateParams.innerHTML = "";

      if (!template || !Array.isArray(template.params) || template.params.length === 0) {
        return;
      }

      for (const param of template.params) {
        const label = document.createElement("label");
        label.textContent = param.label || param.key;
        label.htmlFor = `param_${param.key}`;

        const input = createParamInput(param);
        input.id = `param_${param.key}`;
        input.setAttribute("data-param-key", param.key);
        if (param.description) {
          input.title = param.description;
        }

        templateParams.appendChild(label);
        templateParams.appendChild(input);

        if (param.type !== "code" && (param.description || Number.isFinite(param.min) || Number.isFinite(param.max))) {
          const hint = document.createElement("small");
          const rangeText =
            Number.isFinite(param.min) || Number.isFinite(param.max)
              ? `RANGE: ${Number.isFinite(param.min) ? param.min : "-inf"} ~ ${Number.isFinite(param.max) ? param.max : "+inf"}`
              : "";
          hint.textContent = [param.description || "", rangeText].filter(Boolean).join(" / ");
          templateParams.appendChild(hint);
        }
      }
    }

    function renderTemplateOptions(data) {
      templates = Array.isArray(data.templates) ? data.templates : [];
      templateSelect.innerHTML = "";

      if (templates.length === 0) {
        selectedTemplate = null;
        renderTemplateParams(null);
        updateSubmitState();
        return;
      }

      for (const template of templates) {
        const option = document.createElement("option");
        option.value = template.id;
        option.textContent = `${template.name} (${template.fileName})`;
        templateSelect.appendChild(option);
      }

      selectedTemplate = templates.find((item) => item.id === (data.selected && data.selected.id)) || templates[0];
      templateSelect.value = selectedTemplate.id;
      renderTemplateParams(selectedTemplate);
      updateSubmitState();
    }

    async function refreshTemplates() {
      try {
        const res = await fetch("/templates");
        const data = await res.json();

        if (!res.ok || !data.ok) {
          templates = [];
          selectedTemplate = null;
          renderTemplateParams(null);
          updateSubmitState();
          return;
        }

        renderTemplateOptions(data);
      } catch (error) {
        templates = [];
        selectedTemplate = null;
        renderTemplateParams(null);
        setLogs(String(error));
        updateSubmitState();
      }
    }

    async function refreshBoards() {
      refreshBtn.disabled = true;
      submitBtn.disabled = true;
      setStatus("Checking board...", "");

      try {
        const res = await fetch("/boards");
        const data = await res.json();

        if (!res.ok || !data.ok || !data.selected) {
          selectedBoard = null;
          renderBoardInfo(null);
          setStatus("No board connected", "error");
          return;
        }

        selectedBoard = data.selected;
        renderBoardInfo(selectedBoard);
        if (!selectedBoard.port) {
          setStatus("No port detected: compile-only mode (UNO profile)", "error");
          if (Array.isArray(data.logs) && data.logs.length > 0) {
            setLogs(data.logs);
          }
        } else {
          setStatus("Idle", "");
        }
        updateSubmitState();
      } catch (error) {
        selectedBoard = {
          boardName: "Arduino Uno (default)",
          fqbn: "arduino:avr:uno",
          port: ""
        };
        renderBoardInfo(selectedBoard);
        setStatus("Board scan failed. Default UNO profile loaded", "error");
        setLogs(String(error));
      } finally {
        refreshBtn.disabled = false;
        updateSubmitState();
      }
    }

    refreshBtn.addEventListener("click", refreshBoards);

    templateSelect.addEventListener("change", () => {
      selectedTemplate = templates.find((template) => template.id === templateSelect.value) || null;
      renderTemplateParams(selectedTemplate);
      updateSubmitState();
    });

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      submitBtn.disabled = true;
      setStatus("Compiling...", "");
      setLogs("");

      try {
        const params = {};
        const paramInputs = templateParams.querySelectorAll("[data-param-key]");
        for (const el of paramInputs) {
          params[el.getAttribute("data-param-key")] = el.value;
        }

        const payload = {
          templateId: selectedTemplate ? selectedTemplate.id : "",
          params,
          port: selectedBoard ? selectedBoard.port : "",
          fqbn: selectedBoard ? selectedBoard.fqbn : ""
        };
        const res = await fetch("/upload", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        const data = await res.json();
        setLogs(data.logs || []);

        if (!res.ok || !data.ok) {
          setStatus(data.message || "Error", "error");
          return;
        }

        setStatus("Success", "ok");
      } catch (error) {
        setStatus("Network/Error", "error");
        setLogs(String(error));
      } finally {
        updateSubmitState();
      }
    });

    refreshTemplates();
    refreshBoards();
  </script>
</body>
</html>
